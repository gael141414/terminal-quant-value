name: ⛏️ Minero Nocturno Small Caps

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  minar_datos:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar el código de tu repositorio
        uses: actions/checkout@v4 # <-- Actualizado a v4

      - name: ⚙️ Configurar el entorno de Python
        uses: actions/setup-python@v5 # <-- Actualizado a v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar librerías necesarias
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas lxml html5lib

      - name: 🔍 Comprobar que el archivo existe
        run: ls -la utilidades/

      - name: 🚀 Ejecutar el Motor Cuantitativo
        run: python utilidades/minero_nocturno.py

      - name: 💾 Guardar el tesoro y subirlo a tu App
        run: |
          git config --global user.name "Bot Minero Quant"
          git config --global user.email "bot@valuequant.com"
          git add data/small_caps_oro.csv
          git commit -m "🤖 Minero automático: Nuevas Small Caps encontradas" || echo "No hubo cambios en los datos"
          git push
